name: Android Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release title (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata from versionName
        id: release_meta
        shell: bash
        run: |
          VERSION_NAME=$(awk -F '"' '/versionName[[:space:]]*=/ { print $2; exit }' app/build.gradle.kts)
          if [ -z "$VERSION_NAME" ]; then
            echo "::error::Unable to read versionName from app/build.gradle.kts"
            exit 1
          fi

          RELEASE_TAG="v$VERSION_NAME"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" != "$RELEASE_TAG" ]; then
            echo "::error::Pushed tag (${{ github.ref_name }}) does not match versionName-derived tag ($RELEASE_TAG)."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_name }}" ]; then
            RELEASE_NAME="${{ inputs.release_name }}"
          else
            RELEASE_NAME="Release $RELEASE_TAG"
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ANDROID_KEYSTORE_PATH="$GITHUB_WORKSPACE/release.keystore"
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error::Missing signing secret(s). Required: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          {
            echo "ANDROID_KEYSTORE_PATH=$ANDROID_KEYSTORE_PATH"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: ${{ steps.release_meta.outputs.release_name }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
